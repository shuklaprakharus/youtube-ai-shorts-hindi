name: 🇮🇳 Daily Hindi YouTube Short — Aaj Ka Itihaas

on:
  schedule:
    # Every day at 02:30 UTC = 8:00 AM IST
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Devanagari font + libraqm for proper Hindi text shaping in PIL
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-core \
            fonts-noto-color-emoji \
            fonts-lohit-deva \
            libraqm0 \
            libraqm-dev
          fc-cache -f -v
          echo "── Confirming Devanagari font is registered ──"
          fc-list :lang=hi | head -5 || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output directories
        run: mkdir -p output/slides output/backgrounds

      - name: Generate and upload video
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          # Optional — only set if you switch IMAGE_PROVIDER to "dalle" in config.py
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Save video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "short-${{ github.run_number }}-${{ github.run_attempt }}"
          path: output/final_video.mp4
          retention-days: 14

      - name: Commit updated topics.json (date history)
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics.json
          git diff --cached --quiet || \
            git commit -m "chore: log today's date significance [skip ci]"
          git push
