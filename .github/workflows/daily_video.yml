name: Daily Hindi YouTube Short

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-noto-core fonts-noto-color-emoji fonts-lohit-deva libraqm0 libraqm-dev
          fc-cache -f -v

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output directories
        run: mkdir -p output/slides output/backgrounds

      - name: Preflight secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          REQUIRE_GCS_ARCHIVE: ${{ vars.REQUIRE_GCS_ARCHIVE || 'false' }}
        run: python -c "from preflight import validate_environment; validate_environment(require_youtube=True); print('Preflight OK')"

      - name: Generate and upload video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GCS_PREFIX: ${{ vars.GCS_PREFIX || 'youtube-ai-shorts-hindi' }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          REQUIRE_GCS_ARCHIVE: ${{ vars.REQUIRE_GCS_ARCHIVE || 'false' }}
        run: python main.py

      - name: Save video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-run-${{ github.run_number }}
          path: |
            output/final_video.mp4
            output/run_metadata.json
          retention-days: 14

      - name: Commit topic history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add topics.json
          git diff --cached --quiet || git commit -m "Update covered-events history"
          git push
