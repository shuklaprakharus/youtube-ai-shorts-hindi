name: Daily Hindi YouTube Short

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-noto-core fonts-noto-color-emoji fonts-lohit-deva libraqm0 libraqm-dev
          fc-cache -f -v

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output directories
        run: mkdir -p output/slides output/backgrounds

      - name: Debug check Groq key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY0526 }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "GROQ_API_KEY is EMPTY"
            exit 1
          fi
          echo "GROQ_API_KEY length is ${#GROQ_API_KEY}"

      - name: Generate and upload video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY0526 }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS0526 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Save video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-run-${{ github.run_number }}
          path: output/final_video.mp4
          retention-days: 14
